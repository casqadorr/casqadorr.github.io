<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع كاسكادور</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f9f9f9; padding: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn { padding: 15px 40px; font-size: 20px; background: #28a745; color: white; border-radius: 5px; cursor: pointer; border: none; margin-top: 20px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="progress">الخطوة <span id="current-step">1</span> / 4</div>
    <div id="steps-wrapper"></div>

    <script>
        const wrapper = document.getElementById('steps-wrapper');
        
        // إنشاء الخطوات الأربعة
        for (let s = 1; s <= 4; s++) {
            let stepDiv = document.createElement('div');
            stepDiv.id = 'step-' + s;
            stepDiv.className = 'step' + (s === 1 ? ' active' : '');
            stepDiv.innerHTML = `<h1>الخطوة ${s}</h1><p>يرجى الانتظار حتى انتهاء الوقت للمتابعة.</p>`;
            
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.id = 'btn-' + s;
            btn.disabled = true;
            btn.innerText = "انتظر 10 ثوانٍ";
            btn.onclick = (s < 4) ? () => startStep(s + 1) : showLink;
            stepDiv.appendChild(btn);
            wrapper.appendChild(stepDiv);
        }

        // تشغيل المؤقت
        function startTimer(btn, s) {
            let timeLeft = 10;
            btn.innerText = "انتظر " + timeLeft + " ثانية";
            let timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    btn.innerText = "انتظر " + timeLeft + " ثانية";
                } else {
                    btn.innerText = (s < 4) ? "التالي (" + (s + 1) + "/4)" : "الحصول على الرابط";
                    btn.disabled = false;
                    clearInterval(timer);
                }
            }, 1000);
        }

        // الانتقال بين الخطوات
        function startStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            document.getElementById('current-step').innerText = n;
            window.scrollTo(0, 0);
            startTimer(document.getElementById('btn-' + n), n);
        }

        // بدء المؤقت للخطوة الأولى
        startTimer(document.getElementById('btn-1'), 1);

        // وظيفة جلب الرابط
        async function showLink() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            if (!id) { alert("لم يتم العثور على معرف الرابط."); return; }
            try {
                const response = await fetch("./links.json");
                if (!response.ok) throw new Error("تعذر تحميل ملف links.json");
                const links = await response.json();
                if (links[id]) {
                    window.location.href = links[id];
                } else {
                    alert("الرابط غير موجود.");
                }
            } catch (err) {
                alert("حدث خطأ أثناء تحميل الروابط.");
            }
        }
    </script>
</body>
</html>
