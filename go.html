    <button id="nextBtn" disabled>انتظر 10 ثوانٍ</button>

<script>

let currentStep = 1;
const totalSteps = 4;

const btn = document.getElementById("nextBtn");
const title = document.getElementById("stepTitle");

function startTimer(){

    let time = 10;

    btn.disabled = true;
    btn.textContent = "انتظر " + time + " ثوانٍ";

    const timer = setInterval(()=>{

        time--;

        if(time>0){

            btn.textContent = "انتظر " + time + " ثوانٍ";

        }else{

            clearInterval(timer);

            btn.disabled = false;

            btn.textContent = currentStep < totalSteps
            ? "استمرار"
            : "الحصول على الرابط";

        }

    },1000);

}

btn.onclick = async ()=>{

    if(currentStep < totalSteps){

        currentStep++;

        title.textContent = "الخطوة " + currentStep + "/4";

        window.scrollTo({
            top:0,
            behavior:"smooth"
        });

        startTimer();

        return;

    }

    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    if(!id){
        alert("لا يوجد id في الرابط.");
        return;
    }

    try{

        const response = await fetch("links.json");

        if(!response.ok)
            throw new Error();

        const links = await response.json();

        if(links[id]){

            location.href = links[id];

        }else{

            alert("الرابط غير موجود.");

        }

    }catch{

        alert("تعذر تحميل links.json");

    }

};

startTimer();

</script>
