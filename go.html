<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع كاسكادور</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    font-family:Consolas, "Courier New", monospace;
    background:#050505;
    color:#00ff88;
    overflow-x:hidden;
    min-height:100vh;
}

/* خلفية شبكية */
body{
    background-image:
    linear-gradient(rgba(0,255,120,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,120,.05) 1px, transparent 1px);
    background-size:40px 40px;
    padding:25px;
}

#progress{
    max-width:850px;
    margin:20px auto;
    background:#0d0d0d;
    border:1px solid #00ff88;
    border-radius:12px;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,255,136,.25);
}

.step{
    display:none;
    max-width:850px;
    margin:25px auto;
    padding:30px;
    border:1px solid #00ff88;
    border-radius:15px;
    background:#101010;
    box-shadow:
        0 0 20px rgba(0,255,136,.18),
        inset 0 0 20px rgba(0,255,136,.05);
}

.step.active{
    display:block;
    animation:fade .4s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.step h1{
    color:#00ff88;
    margin-bottom:15px;
    text-shadow:0 0 12px #00ff88;
    font-size:34px;
}

.step p{
    color:#8affc3;
    font-size:18px;
    margin-bottom:25px;
}

.btn{
    width:100%;
    max-width:320px;
    padding:18px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:#000;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 0 20px rgba(0,255,136,.45);
}

.btn:hover:not(:disabled){
    transform:scale(1.04);
    box-shadow:0 0 35px rgba(0,255,136,.8);
}

.btn:disabled{
    background:#1a1a1a;
    color:#666;
    border:1px solid #333;
    box-shadow:none;
    cursor:not-allowed;
}

.ads-container{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:15px;
    margin:25px auto;
}

.ad-frame{
    width:100%;
    height:120px;
    border:1px solid #00ff88;
    border-radius:10px;
    background:#000;
    box-shadow:0 0 10px rgba(0,255,136,.25);
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#050505;
}

::-webkit-scrollbar-thumb{
    background:#00ff88;
    border-radius:20px;
}
</style>

</head>
<body>

    <div id="progress">الخطوة <span id="current-step">1</span> / 4</div>
<div id="steps-wrapper"></div>

    <script>
        const wrapper = document.getElementById('steps-wrapper');
        
        // إنشاء الخطوات الأربعة
        for (let s = 1; s <= 4; s++) {
            let stepDiv = document.createElement('div');
            stepDiv.id = 'step-' + s;
            stepDiv.className = 'step' + (s === 1 ? ' active' : '');
            stepDiv.innerHTML = `<h1>الخطوة ${s}</h1><p>يرجى الانتظار حتى انتهاء الوقت للمتابعة.</p>`;
            










            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.id = 'btn-' + s;
            btn.disabled = true;
            btn.innerText = "انتظر 10 ثوانٍ";
            btn.onclick = (s < 4) ? () => startStep(s + 1) : showLink;
            stepDiv.appendChild(btn);
            wrapper.appendChild(stepDiv);
        }

        // تشغيل المؤقت
        function startTimer(btn, s) {
            let timeLeft = 10;
            btn.innerText = "انتظر " + timeLeft + " ثانية";
            let timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    btn.innerText = "انتظر " + timeLeft + " ثانية";
                } else {
                    btn.innerText = (s < 4) ? "التالي (" + (s + 1) + "/4)" : "الحصول على الرابط";
                    btn.disabled = false;
                    clearInterval(timer);
                }
            }, 1000);
        }

        // الانتقال بين الخطوات
        function startStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            document.getElementById('current-step').innerText = n;
            window.scrollTo(0, 0);
            startTimer(document.getElementById('btn-' + n), n);
        }

        // بدء المؤقت للخطوة الأولى
        startTimer(document.getElementById('btn-1'), 1);

        // وظيفة جلب الرابط
        async function showLink() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            if (!id) { alert("لم يتم العثور على معرف الرابط."); return; }
            try {
                const response = await fetch("./links.json");
                if (!response.ok) throw new Error("تعذر تحميل ملف links.json");
                const links = await response.json();
                if (links[id]) {
                    window.location.href = links[id];
                } else {
                    alert("الرابط غير موجود.");
                }
            } catch (err) {
                alert("حدث خطأ أثناء تحميل الروابط.");
            }
        }
    </script>
</body>
</html>
