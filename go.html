<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجهيز الرابط - نظام الإعلانات المتكامل</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f9f9f9; padding: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .ads-container { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .ad-box { 
            border: 1px solid #ddd; 
            background: #fff; 
            padding: 10px; 
            display: block; 
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            min-height: 50px;
        }
        .ad-box iframe { display: block; margin: auto; max-width: 100%; border: none; width: 100%; }
        .btn { padding: 15px 40px; font-size: 20px; background: #28a745; color: white; border-radius: 5px; cursor: pointer; border: none; margin-top: 20px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #pop-under { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pop-under" onclick="openPopUnder()"></div>
    <div id="progress">الخطوة <span id="current-step">1</span> / 4</div>
    <div id="steps-wrapper"></div>

    <script>
        // دالة إنشاء إعلان داخل Iframe مستقل
        function createAd(container, type) {
            let box = document.createElement('div');
            box.className = 'ad-box';
            container.appendChild(box);

            let iframe = document.createElement('iframe');
            iframe.style.border = "none";
            box.appendChild(iframe);

            let doc = iframe.contentWindow.document;
            let rnd = Math.random();

            if (type === 'aads') {
                iframe.src = "//acceptable.a-ads.com/2446003/?size=Adaptive";
                iframe.style.height = "100px";
            } else {
                let adContent = "";
                if (type === 'shameful') adContent = `<script src="//shameful-farm.com/byXoV/s.dkGNl/0hYaWecL/Oe/m-9Ou/Z/U-lfkSPwTTcayHMhD/MaysO/TVMjt_NhzpIkwlM/z/IH5KNdww?r=${rnd}" async><\/script>`;
                else if (type === 'propeller') adContent = `<script>atOptions = {"key" : "65dbabb611908f80a96ae9a18e5912d9","format" : "iframe","height" : 250,"width" : 300,"params" : {}};<\/script><script src="https://www.highperformanceformat.com/65dbabb611908f80a96ae9a18e5912d9/invoke.js?r=${rnd}"><\/script>`;
                
                doc.open();
                doc.write('<html><head><style>body{margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100px;}</style></head><body>' + adContent + '</body></html>');
                doc.close();
                iframe.style.height = "250px"; // ارتفاع افتراضي
            }
        }

        const wrapper = document.getElementById('steps-wrapper');
        for (let s = 1; s <= 4; s++) {
            let stepDiv = document.createElement('div');
            stepDiv.id = 'step-' + s;
            stepDiv.className = 'step' + (s === 1 ? ' active' : '');
            stepDiv.innerHTML = `<h1>الخطوة ${s}</h1><div class="ads-container" id="ads-container-${s}"></div>`;
            
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.id = 'btn-' + s;
            btn.disabled = true;
            btn.innerText = "انتظر 10 ثوانٍ";
            btn.onclick = (s < 4) ? () => startStep(s + 1) : showLink;
            stepDiv.appendChild(btn);
            wrapper.appendChild(stepDiv);

            let container = document.getElementById('ads-container-' + s);
            // إضافة الإعلانات المتبقية فقط لكل خطوة
            for(let i=0; i<3; i++) createAd(container, 'aads');
            for(let i=0; i<15; i++) createAd(container, 'shameful');
            for(let i=0; i<15; i++) createAd(container, 'propeller');
        }

        function startTimer(btn, s) {
            let timeLeft = 10;
            let timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) btn.innerText = "انتظر " + timeLeft + " ثانية";
                else { btn.innerText = (s < 4) ? "التالي (" + (s + 1) + "/4)" : "الحصول على الرابط"; btn.disabled = false; clearInterval(timer); }
            }, 1000);
        }

        function startStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            document.getElementById('current-step').innerText = n;
            window.scrollTo(0, 0);
            startTimer(document.getElementById('btn-' + n), n);
        }

        function openPopUnder() {
            window.open("https://www.effectivecpmnetwork.com/yikqud60?key=5eb19de74fc2424b1bb5308e8244ffdc", "_blank");
            document.getElementById('pop-under').style.display = 'none';
        }

        startTimer(document.getElementById('btn-1'), 1);

        async function showLink() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
        alert("لم يتم العثور على معرف الرابط.");
        return;
    }

    try {
        const response = await fetch("./links.json");

        if (!response.ok) {
            throw new Error("تعذر تحميل ملف links.json");
        }

        const links = await response.json();

        if (Object.prototype.hasOwnProperty.call(links, id)) {
            window.location.href = links[id];
        } else {
            alert("الرابط غير موجود.");
        }
    } catch (err) {
        console.error(err);
        alert("حدث خطأ أثناء تحميل الروابط.");
    }
}
    </script>
</body>
</html>
