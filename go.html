<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة التحميل</title>
    </head>
<body>
    <div id="pop-under" onclick="openPopUnder()"></div>
    <div id="steps-wrapper"></div>

    <script>
        let popUrl = "";
        let canOpenPop = true;

        // دالة جلب الإعدادات والروابط
        async function init() {
            const resp = await fetch('https://casqadorr.github.io/links.json');
            const data = await resp.json();
            popUrl = data.settings.pop_url;
            
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const targetUrl = data.links[id];
            
            if (!targetUrl) document.body.innerHTML = "<h1>رابط غير موجود</h1>";
            // هنا تكمل منطق عرض الخطوات...
        }

        function openPopUnder() {
            if (!canOpenPop) return;
            window.open(popUrl, "_blank");
            canOpenPop = false;
            setTimeout(() => { canOpenPop = true; }, 5000);
        }

        init();
    </script>
</body>
</html>
