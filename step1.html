<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تخطي الإعلانات - النسخة النهائية</title>
    <style>
        .ad-container { width: 100%; margin: 10px 0; border: none; }
        iframe { border: none; width: 100%; overflow: hidden; }
    </style>
</head>
<body>

    <!-- دالة إنشاء الإعلان داخل iframe مستقل -->
    <script>
        function createIsolatedAd(key, width, height) {
            var html = '<scr' + 'ipt type="text/javascript">' +
                       'atOptions = { "key" : "' + key + '", "format" : "iframe", "height" : ' + height + ', "width" : ' + width + ', "params" : {} };' +
                       '</scr' + 'ipt>' +
                       '<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/' + key + '/invoke.js"></scr' + 'ipt>';
            
            var iframe = document.createElement('iframe');
            iframe.style.width = width + 'px';
            iframe.style.height = height + 'px';
            document.body.appendChild(iframe);
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(html);
            iframe.contentWindow.document.close();
        }
    </script>

    <!-- 3 وحدات A-ADS -->
    <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; width:100%; height:90px;'></iframe>
    <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; width:100%; height:90px;'></iframe>
    <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; width:100%; height:90px;'></iframe>

    <!-- النوع الأول: 6 مرات بنفس المفتاح -->
    <script>for(let i=0; i<6; i++) createIsolatedAd('88f1ce91331d314d9ef54baeff209e91', 320, 50);</script>

    <!-- النوع الثاني: 6 مرات بنفس المفتاح -->
    <script>for(let i=0; i<6; i++) createIsolatedAd('65dbabb611908f80a96ae9a18e5912d9', 300, 250);</script>

    <!-- النوع الثالث: 6 مرات بنفس المفتاح -->
    <script>for(let i=0; i<6; i++) createIsolatedAd('6dadbd1c0664a5adfb47016d73be958e', 320, 50);</script>

    <!-- النوع الرابع: 6 مرات بنفس المفتاح -->
    <script>for(let i=0; i<6; i++) createIsolatedAd('a5b4e81144b7f1b6eb351630841aab53', 320, 90);</script>

</body>
</html>
