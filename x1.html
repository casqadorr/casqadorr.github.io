<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تخطي الإعلانات - الخطوة 1</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background: #f4f4f4; color: #333; }
        .ad-container { width: 100%; margin: 10px 0; overflow: hidden; display: flex; justify-content: center; }
        #timer { font-size: 24px; font-weight: bold; margin: 20px 0; color: #d35400; }
        #btn { display: none; padding: 15px 40px; font-size: 20px; background: #27ae60; color: #fff; border: none; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
        footer { margin-top: 30px; font-size: 14px; color: #777; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <h3>1 / 4</h3>
    <p>انزل للأسفل، انتظر 10 ثوانٍ ثم اضغط استمرار.</p>

    <!--- هنا مكان الاعلانات ----->
    <!-- الإعلان الأول -->
    <div class="ad-container" id="ad1"></div>
    
    <!-- الإعلان الثاني -->
    <div class="ad-container" id="ad2"></div>
    <!--- نهاية الاعلانات ----->

    <div id="timer">10</div>
    <button id="btn" onclick="next()">استمرار</button>

    <footer>© 2026 Casqadorr</footer>

    <script>
        // دالة لتحميل الإعلان
        function loadAd(containerId) {
            var container = document.getElementById(containerId);
            var s = document.createElement('script');
            s.settings = {};
            s.src = "//shameful-farm.com/bYX-VAsvd.GClk0/Y/Wvcc/XeqmH9/u/ZMUxlIk_P/TGchyRMPDUM/yEOCT/M/tUNazeIbw_Mrz/I/5/N/wx";
            s.async = true;
            s.referrerPolicy = 'no-referrer-when-downgrade';
            container.appendChild(s);
        }

        // تحميل الإعلان مرتين في حاويات مختلفة
        loadAd('ad1');
        loadAd('ad2');

        // باقي الكود كما هو
        const urlParams = new URLSearchParams(window.location.search);
        const base64Url = urlParams.get('url');
        let count = 10;
        const timerEl = document.getElementById('timer');
        const btn = document.getElementById('btn');
        
        const interval = setInterval(() => {
            count--;
            timerEl.innerText = count;
            if(count <= 0) {
                clearInterval(interval);
                timerEl.style.display = 'none';
                btn.style.display = 'inline-block';
            }
        }, 1000);

        function next() {
            if(base64Url) {
                window.location.href = 'step2.html?url=' + base64Url;
            }
        }
    </script>
</body>
</html>
