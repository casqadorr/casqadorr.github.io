<!DOCTYPE html>
<html>
<body>
    <!-- البانر -->
    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; width:70%; height:auto; display: block;margin: auto'></iframe>
    </div>

    <h1>مرحباً بكم في موقع مودات GTA SA</h1>
    <p>هذا الموقع لتحميل المودات. ملاحظة: كلمات المرور تجدونها في فيديوهات قناتنا.</p>

    <!-- روابط التواصل -->
    <div>
        <a href="https://youtube.com/@casqadorr">يوتيوب</a>
        <a href="https://facebook.com/@casqadorr">فيسبوك</a>
        <a href="https://t.me/casqadorr">تلغرام</a>
    </div>

    <div id="mods-list"></div>

    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const mods = data.mods;
            const limit = 69;
            // يمكنك إضافة منطق لعرض الصفحة الحالية باستخدام URLSearchParams
            mods.slice(0, limit).forEach(mod => {
                document.getElementById('mods-list').innerHTML += `
                    <div>
                        <h3>${mod.name}</h3>
                        <a href="${mod.download}">تحميل</a>
                        <a href="${mod.video}">شاهد الفيديو (للباسورد)</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
