<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع مودات GTA SA</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; line-height: 1.6; }
        .mod-card { border: 2px solid #ddd; padding: 15px; margin: 15px auto; border-radius: 10px; max-width: 400px; background: #f9f9f9; }
        a { display: inline-block; margin: 5px; padding: 8px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>مرحباً بكم في موقع مودات GTA SA</h1>
    <p>الباسوردات في فيديوهات القناة.</p>

    <div id="mods-list">جاري تحميل المودات...</div>

    <script>
        async function loadMods() {
            try {
                // نستخدم 'no-cache' لضمان جلب آخر نسخة من الملف دائماً
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('تعذر تحميل البيانات');
                
                const data = await response.json();
                const list = document.getElementById('mods-list');
                list.innerHTML = ''; 

                if (data.mods && data.mods.length > 0) {
                    data.mods.forEach(mod => {
                        list.innerHTML += `
                            <div class="mod-card">
                                <h3>${mod.name}</h3>
                                <a href="${mod.download}">تحميل المود</a>
                                <a href="${mod.video}">مشاهدة الفيديو</a>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<p>لا يوجد مودات حالياً.</p>';
                }
            } catch (error) {
                document.getElementById('mods-list').innerHTML = '<p style="color:red;">خطأ: لا يمكن عرض المودات الآن.</p>';
                console.error(error);
            }
        }

        // تشغيل التحميل عند فتح الصفحة
        loadMods();
    </script>
</body>
</html>
