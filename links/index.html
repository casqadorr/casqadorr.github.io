<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">جاري تحضير الرابط...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            text-align: center;
            background-color: #141414;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .timer-header {
            background-color: #1a1a1a;
            border: 2px solid #ff4757;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h1 { font-size: 20px; margin: 5px 0; color: #2ed573; }
        .step-indicator { font-size: 14px; color: #aaa; }
        .timer { font-size: 48px; font-weight: bold; color: #ff4757; margin-top: 5px; }
        
        .ad-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
            width: 100%;
        }
        .ad-box {
            background-color: #1f1f1f;
            border: 1px dashed #444;
            padding: 15px;
            border-radius: 8px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #888;
            box-sizing: border-box;
            width: 100%;
        }
        
        .btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
            width: 100%;
            box-sizing: border-box;
            margin-top: 15px;
        }
        .btn:hover { background-color: #26af5f; }
        
        .pop-trigger {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            cursor: pointer;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="pop-trigger" id="popOverlay"></div>

<div class="container">
    
    <div class="timer-header">
        <div class="step-indicator" id="stepText">المرحلة 1 من 4</div>
        <h1 id="statusText">جار تجهيز رابط التحميل</h1>
        <div class="timer" id="countdown">6</div>
    </div>
    
    <div class="ad-list">
        <div class="ad-box">إعلان 1</div>
        <div class="ad-box">إعلان 2</div>
        <div class="ad-box">إعلان 3</div>
        <div class="ad-box">إعلان 4</div>
        <div class="ad-box">إعلان 5</div>
        <div class="ad-box">إعلان 6</div>
        <div class="ad-box">إعلان 7</div>
        <div class="ad-box">إعلان 8</div>
        <div class="ad-box">إعلان 9</div>
        <div class="ad-box">إعلان 10</div>
    </div>

    <a href="#" class="btn" id="actionBtn">اضغط للتخطي</a>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('link');

    // تم تغيير الرابط مؤقتاً إلى Google للتجربة الآمنة وضمان عدم الحظر
    const popUpUrl = "https://www.google.com"; 

    document.getElementById('popOverlay').addEventListener('click', function() {
        window.open(popUpUrl, '_blank');
        this.remove();
    });

    if (!encodedData) {
        document.getElementById('statusText').textContent = "خطأ: الرابط غير صالح!";
        document.getElementById('countdown').style.display = 'none';
    } else {
        let currentStep = 1;
        let realLinkEncoded = encodedData;

        if (encodedData.includes("-secure-")) {
            const parts = encodedData.split("-secure-");
            realLinkEncoded = parts[0];
            const token = parts[1];

            if (token === btoa("step2")) currentStep = 2;
            else if (token === btoa("step3")) currentStep = 3;
            else if (token === btoa("step4")) currentStep = 4;
            else currentStep = 1;
        }

        document.getElementById('stepText').textContent = `المرحلة ${currentStep} من 4`;
        
        let timeLeft = 6; 
        const countdownEl = document.getElementById('countdown');
        const actionBtn = document.getElementById('actionBtn');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                
                countdownEl.textContent = "جاهز انزل تحت ✅";
                countdownEl.style.color = "#2ed573";
                countdownEl.style.fontSize = "28px";
                actionBtn.style.display = 'block'; 

                if (currentStep < 4) {
                    const nextStep = currentStep + 1;
                    const secureToken = btoa("step" + nextStep);
                    actionBtn.textContent = `الانتقال للمرحلة ${nextStep} ➔`;
                    actionBtn.href = `${window.location.origin}${window.location.pathname}?link=${realLinkEncoded}-secure-${secureToken}`;
                } else {
                    actionBtn.textContent = `تحميل وتنزيل الملف المباشر 📥`;
                    try {
                        actionBtn.href = atob(realLinkEncoded);
                    } catch(e) {
                        actionBtn.href = "#";
                        document.getElementById('statusText').textContent = "خطأ في فك تشفير الرابط!";
                    }
                }
            }
        }, 1000);
    }
</script>

</body>
</html>
