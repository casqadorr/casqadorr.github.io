<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">جاري تحضير الرابط...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            text-align: center;
            background-color: #141414;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
        }
        h1 { font-size: 22px; margin-bottom: 15px; color: #2ed573; }
        .step-indicator { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .timer { font-size: 54px; font-weight: bold; color: #ff4757; margin: 15px 0; }
        .btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
        }
        .btn:hover { background-color: #26af5f; }
        
        /* شبكة الإعلانات الـ 10 */
        .ad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .ad-box {
            background-color: #1f1f1f;
            border: 1px dashed #444;
            padding: 10px;
            border-radius: 6px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }
        .pop-trigger {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            cursor: pointer;
            background: transparent;
        }
    </style>
</head>
<body>

<!-- طبقة البوب أب الشفافة -->
<div class="pop-trigger" id="popOverlay"></div>

<div class="container">
    <div class="step-indicator" id="stepText">المرحلة 1 من 3</div>
    <h1 id="statusText">انتظر قليلاً لتجهيز الرابط الآمن...</h1>
    
    <!-- إعلانات علوية -->
    <div class="ad-grid">
        <div class="ad-box"><!-- كود إعلان 1 -->إعلان 1</div>
        <div class="ad-box"><!-- كود إعلان 2 -->إعلان 2</div>
        <div class="ad-box"><!-- كود إعلان 3 -->إعلان 3</div>
        <div class="ad-box"><!-- كود إعلان 4 -->إعلان 4</div>
    </div>

    <div class="timer" id="countdown">6</div>
    <a href="#" class="btn" id="actionBtn">اضغط للتخطي</a>

    <!-- إعلانات سفلية -->
    <div class="ad-grid">
        <div class="ad-box"><!-- كود إعلان 5 -->إعلان 5</div>
        <div class="ad-box"><!-- كود إعلان 6 -->إعلان 6</div>
        <div class="ad-box"><!-- كود إعلان 7 -->إعلان 7</div>
        <div class="ad-box"><!-- كود إعلان 8 -->إعلان 8</div>
        <div class="ad-box"><!-- كود إعلان 9 -->إعلان 9</div>
        <div class="ad-box"><!-- كود إعلان 10 -->إعلان 10</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('link');

    // رابط البوب أب الخاص بك
    const popUpUrl = "https://www.example-ad-network.com/pop"; 

    document.getElementById('popOverlay').addEventListener('click', function() {
        window.open(popUpUrl, '_blank');
        this.remove();
    });

    if (!encodedData) {
        document.getElementById('statusText').textContent = "خطأ: الرابط غير صالح!";
        document.getElementById('countdown').style.display = 'none';
    } else {
        let currentStep = 1;
        let realLinkEncoded = encodedData;

        // فحص التشفير: هل يحتوي الرابط على علامة الفاصل للخطوات المقفلة؟
        if (encodedData.includes("-st")) {
            const parts = encodedData.split("-st");
            realLinkEncoded = parts[0]; // الرابط الأصلي المشفر
            
            try {
                // فك تشفير الخطوة الحالية للتأكد من عدم التلاعب بها
                currentStep = parseInt(atob(parts[1])) || 1;
            } catch(e) {
                currentStep = 1; // إذا حدث خطأ أو تلاعب، نعيده للمرحلة الأولى
            }
        }

        // تحديث واجهة المستخدم بناءً على الخطوة الحالية الآمنة
        document.getElementById('stepText').textContent = `المرحلة ${currentStep} من 3`;
        
        let timeLeft = 6; // مؤقت 6 ثوانٍ ثابث وصارم
        const countdownEl = document.getElementById('countdown');
        const actionBtn = document.getElementById('actionBtn');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownEl.style.display = 'none';
                actionBtn.style.display = 'inline-block';

                if (currentStep < 3) {
                    // الانتقال للخطوة التالية مع تشفير رقم الخطوة الجديدة القادمة وحمايتها
                    const nextStep = currentStep + 1;
                    const encodedNextStep = btoa(nextStep.toString());
                    
                    actionBtn.textContent = `الانتقال للمرحلة ${nextStep}`;
                    actionBtn.href = `${window.location.origin}${window.location.pathname}?link=${realLinkEncoded}-st${encodedNextStep}`;
                } else {
                    // المرحلة الثالثة والأخيرة: فك تشفير الرابط النهائي والتوجه للتحميل النهائي (Download)
                    actionBtn.textContent = `تحميل وتنزيل الملف المباشر 📥`;
                    try {
                        actionBtn.href = atob(realLinkEncoded);
                    } catch(e) {
                        actionBtn.href = "#";
                        document.getElementById('statusText').textContent = "خطأ في فك تشفير الرابط النهائي!";
                    }
                }
            }
        }, 1000);
    }
</script>

</body>
</html>
