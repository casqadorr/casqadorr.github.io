<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator | Attack N' Destroy</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        .btn-db { background: #007bff; color: white; }
        .btn-other { background: #28a745; color: white; }
        .btn-copy { background: #ff9800; color: white; }
        #result { margin-top: 20px; word-break: break-all; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; min-height: 20px; }
        #status { color: green; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>مولد روابط Attack N' Destroy</h2>
        <input type="text" id="urlInput" placeholder="ضع الرابط هنا...">
        <button class="btn-db" onclick="generate('dropbox')">Dropbox مباشر</button>
        <button class="btn-other" onclick="generate('normal')">رابط عادي</button>
        <div id="result">الرابط سيظهر هنا...</div>
        <button class="btn-copy" onclick="copyResult()">نسخ الرابط</button>
        <div id="status">تم النسخ بنجاح!</div>
    </div>

    <script>
        function generate(type) {
            let url = document.getElementById('urlInput').value;
            if(!url) return;
            if(type === 'dropbox') url = url.replace('dl=0', 'dl=1');
            let encoded = btoa(url);
            document.getElementById('result').innerText = "https://casqadorr.github.io/csqdr4dl.html?id=" + encoded;
        }
        function copyResult() {
            let text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);
            let s = document.getElementById('status');
            s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
