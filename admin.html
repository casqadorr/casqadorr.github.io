<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSQ4S Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>CSQ4S Admin</h1>
<p>لوحة إدارة الروابط المشفرة</p>

</header>

<section class="generator">

<h2>إنشاء رابط جديد</h2>

<label>اسم الملف</label>
<input
type="text"
id="fileName"
placeholder="مثال: GTA V Mod">

<label>الرابط الأصلي</label>
<input
type="url"
id="originalUrl"
placeholder="https://...">

<button id="generateBtn">

إنشاء الرابط

</button>

</section>

<section class="output">

<h2>الرابط النهائي</h2>

<textarea
id="finalLink"
readonly></textarea>

<button id="copyLinkBtn">

نسخ الرابط

</button>

<h2>زر بلوجر</h2>

<textarea
id="bloggerButton"
readonly></textarea>

<button id="copyButtonBtn">

نسخ الكود

</button>

</section>

<section class="history">

<h2>السجل</h2>

<input
type="text"
id="searchBox"
placeholder="بحث...">

<div id="historyContainer">

</div>

<div class="historyButtons">

<button id="exportBtn">

تصدير JSON

</button>

<button id="importBtn">

استيراد JSON

</button>

<button id="clearBtn">

حذف الكل

</button>

</div>

</section>

<footer>

<p>© Casqadorr</p>

</footer>

</div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
