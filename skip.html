    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let encryptedURL = urlParams.get("r");
        const stepLinks = [
            "",
            "https://www.effectivecpmnetwork.com/yikqud60?key=5eb19de74fc2424b1bb5308e8244ffdc",
            "https://www.effectivecpmnetwork.com/dn9yfp8d1?key=e03bbe44829729dd4c6cf46f933c30de",
            "https://www.effectivecpmnetwork.com/edyp4qwtu?key=2608885573f42399274d55028bafa842",
            "https://www.effectivecpmnetwork.com/t91didcckr?key=38e48f00c7b1ac8f8605b61c05d59446"
        ];

        let step = 1, timer = 6;
        let popupOpened = false;
        const btn = document.getElementById("nextBtn");
        const overlay = document.getElementById("overlay");

        overlay.addEventListener("click", function(){
            if(popupOpened) return;
            popupOpened = true;
            window.open(stepLinks[step], "_blank");
            overlay.style.pointerEvents = "none";
        });

        function startTimer(){
            popupOpened = false;
            overlay.style.pointerEvents = "auto";
            btn.disabled = true;
            btn.style.background = "#7f8c8d";
            btn.innerText = "يرجى الانتظار 6 ثوانٍ...";
            timer = 6;
            let c = setInterval(function(){
                timer--;
                if(timer > 0) btn.innerText = "يرجى الانتظار " + timer + " ثوانٍ...";
                else {
                    clearInterval(c);
                    btn.disabled = false;
                    btn.style.background = "#27ae60";
                    btn.style.cursor = "pointer";
                    btn.innerText = "التالي";
                    btn.onclick = next;
                }
            }, 1000);
        }

        function next(){
            if(step < 4){
                step++;
                document.getElementById("stepText").innerText = "الخطوة " + step + " من 4";
                window.scrollTo({ top: 0, behavior: "smooth" });
                startTimer();
            } else if(encryptedURL) {
                window.location.href = atob(encryptedURL);
            }
        }
        
        // بدء المؤقت عند تحميل الصفحة
        startTimer();
    </script>
