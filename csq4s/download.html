<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSQ4S - Attack N' Destroy</title>
    <style>
        body { background: #0a0a0a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .ad-box { background: #1a1a1a; padding: 15px; border: 1px dashed #333; margin: 10px auto; width: 90%; max-width: 500px; }
        #nextBtn { background: #27ae60; color: white; padding: 20px 40px; border: none; cursor: not-allowed; opacity: 0.5; font-size: 18px; }
    </style>
</head>
<body>

    <h2 id="stepText">الخطوة 1 من 4</h2>
    <div id="adsContainer"></div>
    <button id="nextBtn" disabled>يرجى الانتظار...</button>

    <script>
        // 1. توليد الإعلانات
        const adsContainer = document.getElementById('adsContainer');
        for(let i=1; i<=15; i++) {
            let div = document.createElement('div');
            div.className = 'ad-box';
            div.innerText = 'إعلان ' + i;
            adsContainer.appendChild(div);
        }

        // 2. معالجة الروابط والخطوات
        const params = new URLSearchParams(window.location.search);
        let step = parseInt(params.get('step')) || 1;
        let encrypted = params.get('r');

        document.getElementById('stepText').innerText = "الخطوة " + step + " من 4";

        // 3. المؤقت
        const btn = document.getElementById('nextBtn');
        let timer = 14;

        const count = setInterval(() => {
            timer--;
            if(timer > 0) {
                btn.innerText = "يرجى الانتظار " + timer + " ثانية...";
            } else {
                clearInterval(count);
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
                btn.innerText = "استمرار";
            }
        }, 1000);

        // 4. منطق الانتقال
        btn.onclick = function() {
            // فتح بوب اب
            window.open("https://ad-link-here.com", "_blank");
            
            if(step < 4) {
                // الانتقال للخطوة التالية في نفس الصفحة
                window.location.href = `download.html?step=${step + 1}&r=${encrypted}`;
            } else {
                // فك التشفير والتوجه للرابط النهائي
                window.location.href = atob(encrypted);
            }
        };
    </script>
</body>
</html>
