<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSQ4S - Attack N' Destroy</title>
    <style>
        :root { --accent: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .ad-box { background: #1a1a1a; padding: 15px; border: 1px dashed #333; margin: 10px auto; width: 90%; max-width: 500px; }
        #continueBtn { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: not-allowed; opacity: 0.6; margin: 20px 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: transparent; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="handleOverlayClick()"></div>

    <h2 id="stepTitle">الخطوة 1 من 4</h2>
    <div id="adsContainer"></div>
    
    <button id="continueBtn" disabled>انتظر 14 ثانية...</button>

    <script>
        // 1. إظهار الإعلانات
        const container = document.getElementById('adsContainer');
        for(let i=1; i<=15; i++) {
            let div = document.createElement('div');
            div.className = 'ad-box';
            div.innerText = 'إعلان ' + i;
            container.appendChild(div);
        }

        // 2. المؤقت المحدث
        let timer = 14;
        const btn = document.getElementById('continueBtn');
        const urlParams = new URLSearchParams(window.location.search);
        let step = parseInt(urlParams.get('step')) || 1;
        let encryptedURL = urlParams.get('r');

        const countdown = setInterval(() => {
            timer--;
            if (timer > 0) {
                btn.innerText = "انتظر " + timer + " ثانية...";
            } else {
                clearInterval(countdown);
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
                btn.innerText = "استمرار";
            }
        }, 1000);

        // 3. منطق الزر
        btn.onclick = () => {
            window.open("https://ad-link-here.com", "_blank");
            if (step < 4) {
                window.location.href = `download.html?step=${step + 1}&r=${encryptedURL}`;
            } else {
                window.location.href = atob(encryptedURL);
            }
        };

        function handleOverlayClick() {
            window.open("https://ad-link-here.com", "_blank");
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
