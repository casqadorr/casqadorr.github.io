<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحضير الرابط المباشر...</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px 10px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .ad-box {
            background: #252525;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .btn {
            display: inline-block;
            background-color: #ff9800;
            color: #fff;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            width: 85%;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
            margin: 15px 0;
        }
        .btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
        #timer {
            font-size: 28px;
            font-weight: bold;
            color: #00e676;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تجهيز رابط تحميل المود...</h2>
    
    <!-- 1. البانر العلوي الأول -->
    <div class="ad-box">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
    </div>

    <!-- 2. البانر العلوي الثاني -->
    <div class="ad-box">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
    </div>

    <!-- 3. البانر الأوسط (فوق العداد) -->
    <div class="ad-box">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
    </div>

    <!-- منطقة العداد التنازلي -->
    <div id="countdown-area">
        <p>برجاء الانتظار: <span id="timer">15</span> ثانية</p>
    </div>

    <!-- زر التحميل الحقيقي -->
    <button id="download-btn" class="btn" disabled>انتظر تحضير الرابط...</button>

    <!-- 4. البانر السفلي الأول -->
    <div class="ad-box">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
    </div>

    <!-- 5. البانر السفلي الثاني -->
    <div class="ad-box">
        <iframe data-aa='2446003' src='//acceptable.a-ads.com/2446003/?size=Adaptive' style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
    </div>
</div>

<script>
    // === أولاً: كود إعلان البوب اندر السريع (تكرار كل 8 ثوانٍ) ===
    const targetLink = "https://www.effectivecpmnetwork.com/yikqud60?key=5eb19de74fc2424b1bb5308e8244ffdc";
    let canOpenPop = true;

    document.addEventListener('click', function() {
        if (canOpenPop) {
            window.open(targetLink, '_blank');
            canOpenPop = false;
            
            setTimeout(function() {
                canOpenPop = true;
            }, 8000);
        }
    });

    // === ثانياً: كود العداد وفك التشفير ===
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const encryptedLink = getQueryParam('to');
    const timerElement = document.getElementById('timer');
    const buttonElement = document.getElementById('download-btn');
    let timeLeft = 15;

    if (!encryptedLink) {
        document.body.innerHTML = "<h2 style='color:#ff5252; margin-top: 100px;'>خطأ: الرابط غير صالح أو مفقود!</h2>";
    } else {
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('countdown-area').innerHTML = "<p style='color:#00e676; font-weight:bold;'>الرابط جاهز تماماً الآن!</p>";
                
                try {
                    const decryptedLink = atob(encryptedLink); 
                    
                    buttonElement.textContent = "اضغط هنا للتحميل المباشر";
                    buttonElement.removeAttribute('disabled');
                    
                    buttonElement.onclick = function(e) {
                        e.stopPropagation(); // يمنع فتح بوب إضافي عند ضغط زر التحميل النهائي
                        window.location.href = decryptedLink;
                    };
                } catch(e) {
                    document.body.innerHTML = "<h2 style='color:#ff5252; margin-top: 100px;'>خطأ في معالجة الرابط!</h2>";
                }
            }
        }, 1000);
    }
</script>

</body>
</html>
