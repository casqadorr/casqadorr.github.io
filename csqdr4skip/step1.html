<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Step 1</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Tahoma;height:100vh;display:flex;align-items:center;justify-content:center}
.box{text-align:center;padding:30px;max-width:420px}
.spinner{width:70px;height:70px;border:6px solid #333;border-top:6px solid #10b981;border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{margin:10px 0}p{color:#bbb}
.btn{display:none;background:#ff0000;color:#fff;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:bold}
.ok{color:#4ade80}.bad{color:#f87171}
</style>
</head>
<body>
<div class="box">
<div class="spinner" id="sp"></div>
<h2 id="title">جارِ التحقق من ملفك...</h2>
<p id="msg">يرجى الانتظار.</p>
<a id="yt" class="btn" href="https://youtube.com/@casqadorr" target="_blank">📺 مودات أفضل @Casqadorr</a>
</div>
<script>
const p=new URLSearchParams(location.search);
const enc=p.get("to");
function fail(){
sp.style.display="none";
title.className="bad";
title.textContent="❌ ملفك غير موجود";
msg.textContent="الرابط غير صالح أو تالف.";
yt.style.display="inline-block";
}
try{
 if(!enc) throw 0;
 const d=atob(enc);
 if(!/^https?:\/\//i.test(d)) throw 0;
 sp.style.display="none";
 title.className="ok";
 title.textContent="✅ تم التحقق من الملف";
 msg.textContent="سيتم تحويلك...";
 setTimeout(()=>location.href="step2.html?to="+encodeURIComponent(enc),1000);
}catch(e){fail();}
</script>
</body></html>
